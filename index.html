<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Starry Shelf</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-text">
                    <h1>The Starry Shelf</h1>
                    <p>Track your anime, manga, light novels, and books</p>
                </div>
                <button id="add-new-btn" class="btn-primary">Add New</button>
            </div>
        </header>

        <section class="list-section">
            <nav class="tabs-nav">
                <button class="tab-btn active" data-tab="All">All</button>
                <button class="tab-btn" data-tab="Books">Books</button>
                <button class="tab-btn" data-tab="Manga">Manga</button>
                <button class="tab-btn" data-tab="Light Novels">Light Novels</button>
                <button class="tab-btn" data-tab="Shows">Shows</button>
                <button class="tab-btn" data-tab="Podcasts">Podcasts</button>
                <button class="tab-btn" data-tab="Status">Status</button>
                <button class="tab-btn" data-tab="Stats">Stats</button>
            </nav>

            <div class="controls-bar" id="controls-bar">
                <select id="sort-select">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="year-desc">Year (New to Old)</option>
                    <option value="year-asc">Year (Old to New)</option>
                </select>
                
                <select id="filter-status-select">
                    <option value="all">All Status</option>
                    <option value="active">Active</option>
                    <option value="completed">Completed</option>
                </select>

                <select id="filter-category-select" style="display:none;">
                    <option value="all">All Categories</option>
                    <option value="Books">Books</option>
                    <option value="Manga">Manga</option>
                    <option value="Light Novels">Light Novels</option>
                    <option value="Anime">Anime</option>
                    <option value="TV Shows">TV Shows</option>
                    <option value="Podcasts">Podcasts</option>
                </select>
            </div>

            <div id="items-list" class="items-grid">
                <!-- Items will be injected here -->
            </div>

            <div id="stats-view" style="display: none;">
                <div class="stats-card">
                    <h3>Progress Over Time</h3>
                    <div style="position: relative; height:300px; width:100%">
                        <canvas id="progressChart"></canvas>
                    </div>
                </div>
                <div class="stats-card">
                    <h3>Activity Heatmap</h3>
                    <div class="heatmap-container">
                        <div id="heatmap" class="heatmap-grid"></div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- The Modal -->
    <div id="item-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2 id="modal-title">Add New Item</h2>
            <form id="item-form">
                <input type="hidden" id="item-id">

                <div class="form-group">
                    <input type="text" id="item-title" placeholder="Name" autocomplete="off" required>
                </div>

                <div class="form-group row">
                    <select id="item-type" required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="Books">Books</option>
                        <option value="Manga">Manga</option>
                        <option value="Light Novels">Light Novels</option>
                        <option value="Anime">Anime</option>
                        <option value="TV Shows">TV Shows</option>
                        <option value="Podcasts">Podcasts</option>
                    </select>
                </div>

                <div class="form-group row">
                    <select id="item-month" required>
                        <option value="" disabled selected>Start Month</option>
                        <option value="Jan">Jan</option>
                        <option value="Feb">Feb</option>
                        <option value="Mar">Mar</option>
                        <option value="Apr">Apr</option>
                        <option value="May">May</option>
                        <option value="Jun">Jun</option>
                        <option value="Jul">Jul</option>
                        <option value="Aug">Aug</option>
                        <option value="Sep">Sep</option>
                        <option value="Oct">Oct</option>
                        <option value="Nov">Nov</option>
                        <option value="Dec">Dec</option>
                    </select>
                    <input type="number" id="item-year" placeholder="Start Year" min="1800" max="2100" autocomplete="off" required>
                </div>

                <div class="form-group" style="position: relative;">
                    <input type="url" id="item-image" placeholder="Cover Image URL (Auto-fetches)" autocomplete="off">
                    <span id="fetch-status" style="position: absolute; right: 15px; top: 16px; font-size: 0.85rem; color: var(--primary); font-weight: 600;"></span>
                </div>

                <div class="form-group">
                    <label id="progress-label" style="color: var(--text-main); font-size: 0.9rem; margin-bottom: 0.3rem; display: block; padding-left: 0.2rem;">Progress</label>
                    <input type="number" id="item-progress" placeholder="0" min="0" autocomplete="off" required>
                </div>

                <div class="form-group row">
                    <div style="flex: 1;">
                        <label style="color: var(--text-main); font-size: 0.9rem; margin-bottom: 0.3rem; display: block; padding-left: 0.2rem;">Time Taken</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="number" id="item-duration-val" placeholder="Duration" min="1" autocomplete="off">
                            <select id="item-duration-unit">
                                <option value="days">Days</option>
                                <option value="weeks">Weeks</option>
                                <option value="months">Months</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group rating-group">
                    <label style="color: var(--text-main); font-size: 0.9rem; margin-bottom: 0.3rem; display: block; padding-left: 0.2rem;">Rating</label>
                    <div class="star-rating" id="star-rating">
                        <span data-value="1">&#9733;</span>
                        <span data-value="2">&#9733;</span>
                        <span data-value="3">&#9733;</span>
                        <span data-value="4">&#9733;</span>
                        <span data-value="5">&#9733;</span>
                    </div>
                    <input type="hidden" id="item-rating" value="0">
                </div>

                <div class="form-group" id="status-group" style="display: none;">
                    <label style="color: var(--text-main); font-size: 0.9rem; margin-bottom: 0.3rem; display: block; padding-left: 0.2rem;">Status</label>
                    <select id="item-status">
                        <option value="false">Active</option>
                        <option value="true">Completed</option>
                    </select>
                </div>

                <div class="form-group row" style="justify-content: flex-end; margin-top: 1.5rem;">
                    <button type="submit" class="btn-primary">Save Item</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <!-- Chart.js for stats -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- App Logic -->
    <script src="app.js"></script>
</body>

</html>
